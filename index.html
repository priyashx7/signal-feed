<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNAL - Daily Intelligence Feed</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=Syne:wght@500;700;800&display=swap"
        rel="stylesheet">

    <!-- Boxicons for icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div>
                    <h1 class="logo">SIGNAL.</h1>
                    <p class="tagline">Daily Intelligence Feed</p>
                </div>
                <button class="mobile-menu-btn" id="mobileMenuBtn"><i class='bx bx-menu'></i></button>
            </div>

            <div class="sidebar-menu" id="sidebarMenu">
                <div class="sidebar-section">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <label for="purposeInput" class="section-label" style="margin-bottom: 0;">Your Purpose /
                            Interests</label>
                        <button id="editPurposeBtn" class="icon-btn" style="padding: 4px;" title="Edit Purpose"><i
                                class='bx bx-edit' style="font-size: 1.2rem;"></i></button>
                    </div>
                    <textarea id="purposeInput" placeholder="e.g., AI tools, startups, EdTech..." maxlength="150"
                        rows="3" readonly></textarea>
                    <div class="char-count"><span id="purposeCount">0</span>/150</div>
                </div>

                <div class="sidebar-section">
                    <label for="timeframeSelect" class="section-label">Timeframe</label>
                    <select id="timeframeSelect">
                        <option value="today" selected>Today (Published Yesterday)</option>
                        <option value="yesterday" disabled>Yesterday</option>
                        <option value="7days" disabled>Past 7 Days</option>
                    </select>
                </div>

                <button id="fetchNewsBtn" class="primary-btn" disabled>
                    <i class='bx bx-radar'></i> Get News
                </button>

                <nav class="sidebar-nav">
                    <button class="nav-item active" data-view="feed">
                        <i class='bx bx-layer'></i> Feed
                    </button>
                    <button class="nav-item" data-view="saved">
                        <i class='bx bx-bookmark'></i> Saved
                    </button>
                    <button class="nav-item" data-view="reports">
                        <i class='bx bx-pie-chart-alt-2'></i> Weekly Reports
                    </button>
                </nav>

            </div> <!-- End sidebar-menu -->
        </aside>
        <div class="menu-backdrop" id="menuBackdrop"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Feed View (Swipeable Stack) -->
            <div id="view-feed" class="view-section active">
                <div class="stats-bar">
                    <div id="statsInfo"></div>
                </div>

                <div class="card-stack-container" id="cardStack">
                    <!-- Cards will be injected here dynamically -->
                    <div class="empty-state">
                        <div class="glass-icon"><i class='bx bx-radar'></i></div>
                        <h2>No Intel Found</h2>
                        <p>Click "Get News" to fetch your daily feed.</p>
                    </div>
                </div>
            </div>

            <!-- Saved View (Swipeable Stack) -->
            <div id="view-saved" class="view-section" style="display: none;">
                <div class="stats-bar">
                    <h2>Saved Intel</h2>
                    <span id="savedCount">0 items</span>
                </div>
                <div class="card-stack-container" id="savedGrid">
                    <!-- Saved cards stack injected here -->
                </div>
            </div>

            <!-- Reports View -->
            <!-- Reports View -->
            <div id="view-reports" class="view-section" style="display: none; flex-direction: column;">
                <div class="header" style="justify-content: space-between; margin-bottom: 24px;">
                    <div>
                        <h2>Weekly Insight Report</h2>
                        <div class="stats" id="reportsCount" style="color: var(--text-secondary); margin-top: 4px;">0
                            reports</div>
                    </div>
                </div>

                <div id="reportsGrid" class="grid-container"
                    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; overflow-y: auto; padding-bottom: 40px;">
                    <!-- Reports go here -->
                </div>
            </div>
        </main>

        <!-- Slide-over Detail Panel -->
        <div class="detail-panel" id="detailPanel">

            <div class="detail-content" id="detailContent">
                <!-- Content toggled between Article Detail and Sentiment -->
            </div>
        </div>
        <div class="panel-backdrop" id="panelBackdrop"></div>


        <!-- Delete Confirmation Modal -->
        <div class="settings-overlay" id="deleteConfirmOverlay">
            <div class="settings-modal" style="max-width: 400px; text-align: center;">
                <div class="glass-icon" style="color: var(--accent-secondary); margin-bottom: 16px;">
                    <i class='bx bx-trash' style="font-size: 3rem;"></i>
                </div>
                <h3 style="margin-bottom: 16px;">Delete Saved Intel?</h3>
                <p style="color: var(--text-secondary); margin-bottom: 32px; font-size: 0.95rem; line-height: 1.5;">
                    Deleting this will remove this card and it can't be restored.
                </p>
                <div style="display: flex; gap: 16px;">
                    <button id="cancelDeleteBtn" class="action-btn" style="flex: 1; margin-bottom: 0;">Cancel</button>
                    <button id="confirmDeleteBtn" class="primary-btn"
                        style="flex: 1; margin-bottom: 0; background-color: #ef4444; color: white;">Delete</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div class="toast" id="toast">Message</div>
    </div>

    <!-- Scripts -->
    <!--<script src="js/config.js"></script>-->
    <script>
        const AppConfig = {
            geminiKey: '',
            geminiModel: 'gemini-2.5-flash',
            notionToken: '',
            notionDbIdAll: '31853bc5fb4f806985aeddc3992b260e',
            notionDbIdSaved: '31853bc5fb4f809fa4e8c38498805ca8',
            notionDbIdReports: '31953bc5fb4f8062a4efc3ad3d99e73c'
        };
        fetch('https://notion-proxy.priyashnamdeo.workers.dev/config')
            .then(r => r.json())
            .then(cfg => {
                AppConfig.geminiKey = cfg.geminiKey;
                AppConfig.notionToken = cfg.notionToken;
            });
    </script>
    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/components/card.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
