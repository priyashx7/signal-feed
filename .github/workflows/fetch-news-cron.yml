name: Schedule Daily News Fetch (6:00 AM IST)
on:
  schedule:
    # 00:30 UTC translates exactly to 6:00 AM IST
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  fetch-latest-intel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Fetch and Parse Daily News

        # This executes the same backend function the Get News button uses
        run: npm run daily-sync
