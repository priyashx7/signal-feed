name: SIGNAL Notion Cleanup
on:
  schedule:
    - cron: '0 2 * * *' # Runs at 2:00 AM UTC (7:30 AM IST) daily
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Cleanup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_DB_ID_REPORTS: ${{ secrets.NOTION_DB_ID_REPORTS }}
        run: npm run cleanup
